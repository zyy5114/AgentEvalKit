task_id: math_addition
description: Solve a small deterministic math task.
input:
  question: "2 + 3"
adapter:
  type: cli
  command: "python -m examples.fake_agents.math_agent"
output_schema: {type: object, required: [answer], properties: {answer: {type: integer}}}
behavior_rules:
  forbid_tools:
    - web.search
  require_tools_any_of:
    - [math.solve]
    - [python.eval, calculator.basic]
  max_steps: 2
  max_tool_calls: 2
  trace_required: true
  timeout_sec: 5
scorers:
  - type: exact_match
